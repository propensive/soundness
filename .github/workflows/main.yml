name: Verify CI Signature
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Fetch CI signature notes
      run: |
        git fetch origin 'refs/notes/ci-verified:refs/notes/ci-verified' \
          || echo "no ci-verified notes ref on origin yet"

    - name: Verify CI attestation
      env:
        GNUPGHOME: ${{ runner.temp }}/ci-gpg
      run: |
        set -e
        mkdir -p "$GNUPGHOME"
        chmod 700 "$GNUPGHOME"
        while IFS= read -r user; do
          [ -z "$user" ] && continue
          case "$user" in \#*) continue ;; esac
          echo "Importing GPG key for: $user"
          curl -fsSL "https://github.com/${user}.gpg" | gpg --import
        done < etc/ci-maintainers
        ./etc/ci-verify
