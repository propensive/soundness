name: Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install shells
      run: |
        sudo apt-get update
        sudo apt-get install -y bash zsh fish
        touch ~/.zshrc
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Install tmux
      run: |
        sudo apt-get update
        sudo apt-get install -y tmux
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '23'
    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: 0.13.0
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-gnu,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-apple-darwin,aarch64-apple-darwin
    - name: Install cargo-zigbuild
      run: cargo install --locked cargo-zigbuild
    - name: Mill Build
      run: ./mill --ticker false --silent test.assembly && make ci
